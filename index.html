<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NICU Nutrition Pro - Patient Management</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts (Cairo) -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; }
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Firebase Simulation/Config Placeholder
        const firebaseConfig = JSON.parse(__firebase_config || '{}');
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'nicu-nutrition-v1';

        // Icons Component Wrapper
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, [name, className]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        function App() {
            const [view, setView] = useState('dashboard'); // dashboard, patient_list, add_patient, patient_profile, visit_editor
            const [patients, setPatients] = useState([]);
            const [selectedPatient, setSelectedPatient] = useState(null);
            const [selectedVisit, setSelectedVisit] = useState(null);
            const [visits, setVisits] = useState([]);

            // Form States
            const [newPatient, setNewPatient] = useState({ name: '', medicalId: '', birthDate: '' });
            const [activeMainTab, setActiveMainTab] = useState('en');

            const [formData, setFormData] = useState({
                patientInfo: { physician: '', pharmacist: '', date: new Date().toISOString().split('T')[0] },
                en: { weight: '', option: 'Breast milk', hours: 3, initRate: 20, advance: 20, goal: 150 },
                tpn: { fluidKg: 100, weight: '', targetEnergy: 110, enteralFluid: 0, caloricDensity: 0.67, otherFluid: 0, gir: 6, gluOtherRate: 0, gluOtherDur: 0, gluOtherConc: 5, infusionHours: 24, protConc: '10', protIntake: 3, lipidConc: '20', lipidIntake: 1, naclType: '3', naclIntake: 3, kclIntake: 2, caIntake: 2, mgIntake: 0.5, phosIntake: 1, traceVol: 0, vitaVol: 0, soluVol: 0 },
                monitoring: { labs: '', clinical: '', plan: '' }
            });

            // Mocking Firestore behavior for HTML conversion (In-memory storage)
            const handleAddPatient = () => {
                if (!newPatient.name) return;
                const p = { ...newPatient, id: Date.now().toString(), lastWeight: '' };
                setPatients([...patients, p]);
                setNewPatient({ name: '', medicalId: '', birthDate: '' });
                setView('patient_list');
            };

            const handleOpenPatient = (p) => {
                setSelectedPatient(p);
                setView('patient_profile');
            };

            const handleAddVisit = () => {
                const today = new Date().toISOString().split('T')[0];
                setFormData({
                    ...formData,
                    patientInfo: { ...formData.patientInfo, date: today },
                    en: { ...formData.en, weight: selectedPatient.lastWeight || '' },
                    tpn: { ...formData.tpn, weight: selectedPatient.lastWeight || '' }
                });
                setSelectedVisit(null);
                setView('visit_editor');
            };

            const saveVisit = () => {
                const visitData = { id: Date.now().toString(), date: formData.patientInfo.date, data: JSON.parse(JSON.stringify(formData)) };
                setVisits([visitData, ...visits]);
                
                const currentWeight = formData.en.weight || formData.tpn.weight;
                if (currentWeight) {
                    const updatedPatients = patients.map(p => p.id === selectedPatient.id ? {...p, lastWeight: currentWeight} : p);
                    setPatients(updatedPatients);
                    setSelectedPatient({...selectedPatient, lastWeight: currentWeight});
                }
                setView('patient_profile');
            };

            // Calculations
            const calcEN = () => {
                const { weight, hours, initRate, advance, goal } = formData.en;
                const w = parseFloat(weight) || 0;
                const h = parseFloat(hours) || 1;
                const freq = 24 / h;
                return {
                    start: ((initRate * w) / freq).toFixed(1),
                    inc: ((advance * w) / freq).toFixed(1),
                    max: ((goal * w) / freq).toFixed(1)
                };
            };

            const calcTPN = () => {
                const { tpn } = formData;
                const w = parseFloat(tpn.weight) || 0;
                const fluidTarget = (parseFloat(tpn.fluidKg) || 0) * w;
                const entFluid = parseFloat(tpn.enteralFluid) || 0;
                const otherFluid = parseFloat(tpn.otherFluid) || 0;
                const tpnFluid = fluidTarget - entFluid - otherFluid;

                const pG = (parseFloat(tpn.protIntake) || 0) * w;
                const pV = pG / (parseFloat(tpn.protConc) / 100);
                const lG = (parseFloat(tpn.lipidIntake) || 0) * w;
                const lV = lG / (parseFloat(tpn.lipidConc) / 100);

                const gir = parseFloat(tpn.gir) || 0;
                const tpnG = (gir * w * 1440) / 1000;
                const tpnVolG = tpnFluid - (pV + lV + 10); // simplified for mockup logic

                return { tpnFluid, pV, lV, tpnG, tpnVolG, pG, lG, tpnEnergy: (pG*4 + lG*10 + tpnG*3.4) };
            };

            const tpnRes = calcTPN();
            const enRes = calcEN();

            // Components
            const Dashboard = () => (
                <div className="p-8 space-y-6">
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div onClick={() => setView('add_patient')} className="cursor-pointer flex flex-col items-center p-10 bg-white border-2 border-blue-100 rounded-3xl hover:border-blue-500 hover:shadow-xl transition-all">
                            <Icon name="plus-circle" size={64} className="text-blue-500 mb-4" />
                            <span className="text-xl font-bold">إضافة مريض جديد</span>
                            <span className="text-gray-400 mt-2">Add New Patient</span>
                        </div>
                        <div onClick={() => setView('patient_list')} className="cursor-pointer flex flex-col items-center p-10 bg-white border-2 border-purple-100 rounded-3xl hover:border-purple-500 hover:shadow-xl transition-all">
                            <Icon name="users" size={64} className="text-purple-500 mb-4" />
                            <span className="text-xl font-bold">عرض المرضى</span>
                            <span className="text-gray-400 mt-2">View Patients</span>
                        </div>
                    </div>
                </div>
            );

            const PatientProfile = () => (
                <div className="p-6 space-y-6">
                    <div className="flex justify-between items-center">
                        <button onClick={() => setView('patient_list')} className="flex items-center gap-2 text-gray-500 font-bold"><Icon name="arrow-right" /> رجوع</button>
                        <button onClick={handleAddVisit} className="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold flex items-center gap-2 shadow-lg"><Icon name="calendar-plus" size={18} /> إضافة زيارة</button>
                    </div>
                    <div className="bg-white p-6 rounded-3xl border shadow-sm flex items-center gap-6">
                        <div className="w-20 h-20 bg-blue-600 rounded-2xl flex items-center justify-center text-white text-3xl font-bold">{selectedPatient.name.charAt(0)}</div>
                        <div className="text-right">
                            <h2 className="text-2xl font-bold text-gray-800">{selectedPatient.name}</h2>
                            <p className="text-gray-500">ID: {selectedPatient.medicalId} | الوزن الأخير: {selectedPatient.lastWeight || '--'} kg</p>
                        </div>
                    </div>
                    <h3 className="text-xl font-bold border-b pb-2">الزيارات السابقة</h3>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {visits.length === 0 ? (
                            <div className="col-span-full py-12 text-center text-gray-400">لا يوجد زيارات مسجلة.</div>
                        ) : (
                            visits.map(v => (
                                <div key={v.id} className="p-4 bg-white border-r-4 border-r-blue-500 rounded-xl shadow-sm border">
                                    <div className="flex justify-between items-center mb-2">
                                        <span className="font-bold text-blue-600">{v.date}</span>
                                        <Icon name="chevron-left" className="text-gray-300" />
                                    </div>
                                    <p className="text-sm text-gray-600">الوزن المسجل: {v.data.en.weight || v.data.tpn.weight} kg</p>
                                </div>
                            ))
                        )}
                    </div>
                </div>
            );

            return (
                <div className="max-w-4xl mx-auto bg-white min-h-screen shadow-2xl overflow-hidden">
                    {/* Header */}
                    <div className="bg-blue-900 text-white p-8 text-center relative">
                        <h1 className="text-3xl font-bold mb-1">NICU Nutrition Pro</h1>
                        <p className="text-blue-200">د. أحمد جلال - دعم التغذية</p>
                        {view !== 'dashboard' && (
                            <button onClick={() => setView('dashboard')} className="absolute right-8 top-1/2 -translate-y-1/2 opacity-50 hover:opacity-100 transition-opacity">
                                <Icon name="home" size={28} />
                            </button>
                        )}
                    </div>

                    {/* Content */}
                    <div className="transition-all duration-300">
                        {view === 'dashboard' && <Dashboard />}
                        
                        {view === 'add_patient' && (
                            <div className="p-8">
                                <h2 className="text-2xl font-bold mb-6 text-center">تسجيل مريض جديد</h2>
                                <div className="space-y-4 max-w-md mx-auto">
                                    <input type="text" placeholder="اسم المريض" className="w-full p-4 border rounded-2xl" value={newPatient.name} onChange={e => setNewPatient({...newPatient, name: e.target.value})} />
                                    <input type="text" placeholder="الرقم الطبي" className="w-full p-4 border rounded-2xl" value={newPatient.medicalId} onChange={e => setNewPatient({...newPatient, medicalId: e.target.value})} />
                                    <input type="date" className="w-full p-4 border rounded-2xl" value={newPatient.birthDate} onChange={e => setNewPatient({...newPatient, birthDate: e.target.value})} />
                                    <button onClick={handleAddPatient} className="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold text-lg shadow-lg">حفظ المريض</button>
                                </div>
                            </div>
                        )}

                        {view === 'patient_list' && (
                            <div className="p-6 space-y-4">
                                <h2 className="text-2xl font-bold mb-4">قائمة المرضى</h2>
                                {patients.map(p => (
                                    <div key={p.id} onClick={() => handleOpenPatient(p)} className="p-4 bg-white border rounded-2xl shadow-sm flex justify-between items-center cursor-pointer hover:bg-blue-50">
                                        <div className="flex items-center gap-4">
                                            <div className="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 font-bold">{p.name.charAt(0)}</div>
                                            <div className="text-right">
                                                <h3 className="font-bold">{p.name}</h3>
                                                <p className="text-xs text-gray-500">ID: {p.medicalId}</p>
                                            </div>
                                        </div>
                                        <Icon name="chevron-left" className="text-gray-300" />
                                    </div>
                                ))}
                            </div>
                        )}

                        {view === 'patient_profile' && <PatientProfile />}

                        {view === 'visit_editor' && (
                            <div className="space-y-6">
                                <div className="bg-gray-50 p-4 flex justify-between items-center border-b">
                                    <h3 className="font-bold">زيارة جديدة: {selectedPatient.name}</h3>
                                    <button onClick={saveVisit} className="bg-green-600 text-white px-6 py-2 rounded-xl font-bold flex items-center gap-2"><Icon name="save" size={18} /> حفظ الزيارة</button>
                                </div>
                                <div className="p-6">
                                    <div className="flex border-b mb-6">
                                        <button onClick={() => setActiveMainTab('en')} className={`flex-1 py-3 font-bold ${activeMainTab === 'en' ? 'border-b-4 border-blue-600 text-blue-600' : 'text-gray-400'}`}>Enteral (EN)</button>
                                        <button onClick={() => setActiveMainTab('tpn')} className={`flex-1 py-3 font-bold ${activeMainTab === 'tpn' ? 'border-b-4 border-blue-600 text-blue-600' : 'text-gray-400'}`}>Parenteral (TPN)</button>
                                    </div>

                                    {activeMainTab === 'en' ? (
                                        <div className="space-y-6">
                                            <div className="grid grid-cols-2 gap-4">
                                                <div><label className="text-xs font-bold block mb-1">الوزن (kg)</label><input type="number" className="w-full p-2 border rounded" value={formData.en.weight} onChange={e => setFormData({...formData, en: {...formData.en, weight: e.target.value}})} /></div>
                                                <div><label className="text-xs font-bold block mb-1">النوع</label><select className="w-full p-2 border rounded" value={formData.en.option} onChange={e => setFormData({...formData, en: {...formData.en, option: e.target.value}})}><option>Breast milk</option><option>Formula</option></select></div>
                                            </div>
                                            <div className="bg-blue-50 p-6 rounded-2xl border-2 border-blue-100">
                                                <h4 className="font-bold mb-2 flex items-center gap-2"><Icon name="calculator" size={18} /> نتائج التغذية</h4>
                                                <p>• ابدأ بـ <span className="font-bold text-blue-600">{enRes.start}</span> مل كل {formData.en.hours} ساعات.</p>
                                                <p>• الزيادة اليومية <span className="font-bold text-blue-600">{enRes.inc}</span> مل.</p>
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="space-y-6">
                                            <div className="grid grid-cols-2 gap-4">
                                                <div><label className="text-xs font-bold block mb-1">Target Fluid</label><input type="number" className="w-full p-2 border rounded" value={formData.tpn.fluidKg} onChange={e => setFormData({...formData, tpn: {...formData.tpn, fluidKg: e.target.value}})} /></div>
                                                <div><label className="text-xs font-bold block mb-1">GIR</label><input type="number" className="w-full p-2 border rounded" value={formData.tpn.gir} onChange={e => setFormData({...formData, tpn: {...formData.tpn, gir: e.target.value}})} /></div>
                                            </div>
                                            <div className="bg-indigo-900 text-white p-6 rounded-2xl">
                                                <div className="flex justify-between items-center">
                                                    <span>إجمالي طاقة TPN:</span>
                                                    <span className="text-2xl font-bold">{tpnRes.tpnEnergy.toFixed(1)} kcal</span>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

```
